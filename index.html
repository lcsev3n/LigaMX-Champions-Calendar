<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven Sports Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header con logo y título -->
    <header class="header">
        <div class="header-content">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'%3E%3Ccircle cx='25' cy='25' r='24' fill='%231e90ff'/%3E%3Ctext x='25' y='32' font-size='28' font-weight='bold' fill='white' text-anchor='middle'%3E7%3C/text%3E%3C/svg%3E" alt="Logo" class="logo">
            <div class="header-text">
                <h1>Seven Sports Calendar</h1>
                <p class="subtitle">Tu calendario deportivo. Siempre actualizado.</p>
            </div>
        </div>
    </header>

    <!-- Contenedor principal -->
    <main class="container">
        <!-- Sección de próximos partidos con nueva estructura -->
        <section class="matches-section">
            <h2>Próximos Partidos</h2>
            <div id="matches" class="matches-container">
                <!-- Los partidos se cargarán dinámicamente desde script.js -->
            </div>
        </section>

        <!-- Sección de botones de acción -->
        <section class="actions-section">
            <button id="subscribe-btn" class="btn btn-primary">
                <span class="btn-icon">📧</span>
                Suscribirme
            </button>
            <button id="download-btn" class="btn btn-secondary">
                <span class="btn-icon">📥</span>
                Descargar .ics
            </button>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 Seven Sports Calendar. Todos los derechos reservados.</p>
    </footer>

    <!-- Script principal -->
    <script src="script.js"></script>
</body>
</html>
